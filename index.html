<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Student Login</title>

<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<div class="container">

<form id="studentForm">

<h2>Student Login</h2>

<label>First Name</label>
<input type="text" id="firstName">
<div class="error" id="firstNameError">First name is required</div>

<label>Last Name</label>
<input type="text" id="lastName">
<div class="error" id="lastNameError">Last name is required</div>

<label>Email</label>
<input type="email" id="email">
<div class="error" id="emailError">Enter a valid email</div>

<label>Password</label>
<input type="password" id="password">
<div class="error" id="passwordError">Password must be at least 6 characters</div>

<label>Student ID</label>
<input type="text" id="studentID">
<div class="error" id="studentIDError">Student ID is required</div>

<button type="submit">Login</button>

</form>

<div id="successMessage" class="success">
Login successful! Welcome student.
</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
